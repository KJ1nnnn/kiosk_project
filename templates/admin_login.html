{% extends "base.html" %}

{% block content %}
<section class="admin-login-layout">
  <article class="admin-login-panel">
    <p class="eyebrow">관리자 인증</p>
    <h1>비밀번호를 입력하세요</h1>
    <p>상품 재고와 주문 내역은 관리자 인증 후 확인할 수 있습니다.</p>

    <form class="admin-login-form" action="{{ url_for('admin_login', next=request.args.get('next', url_for('admin'))) }}" method="post">
      <label>
        관리자 비밀번호
        <input type="password" name="password" inputmode="numeric" autocomplete="current-password" placeholder="0000" required autofocus>
      </label>
      <button class="button button-primary button-large" type="submit">관리자 들어가기</button>
    </form>
  </article>
</section>
{% endblock %}
