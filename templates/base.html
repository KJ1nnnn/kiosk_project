<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Campus Tool Kiosk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">K</span>
        <span>
          <strong>Campus Tool Kiosk</strong>
          <small>학습 도구 대여·구매</small>
        </span>
      </a>
      <nav class="nav">
        <a href="{{ url_for('menu') }}">대여·구매</a>
        <a href="{{ url_for('cart') }}">장바구니</a>
        <a href="{{ url_for('return_item') }}">반납</a>
        <a href="{{ url_for('admin') }}">관리자</a>
      </nav>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <section class="flash-area" aria-label="알림">
          {% for category, message in messages %}
            <p class="flash flash-{{ category }}">{{ message }}</p>
          {% endfor %}
        </section>
      {% endif %}
    {% endwith %}

    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
