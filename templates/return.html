{% extends "base.html" %}

{% block content %}
<section class="tag-layout">
  <article class="tag-panel">
    <p class="eyebrow">물품 반납</p>
    <h1>학생증을 태그하고 반납을 완료하세요</h1>
    <p>
      실제 반납함과 학생증 리더기는 사용하지 않는 시뮬레이션입니다. 버튼을 누르면
      학생증 확인 후 반납 완료 화면으로 이동합니다.
    </p>

    <div class="tag-summary">
      <h2>반납 안내</h2>
      <strong>보증금 반환</strong>
      <span>대여 물품 확인 후 보증금이 반환되는 흐름입니다.</span>
    </div>

    <form action="{{ url_for('return_student_id') }}" method="post">
      <button class="button button-primary button-large" type="submit">학생증 태그하고 반납</button>
    </form>
  </article>
</section>
{% endblock %}
