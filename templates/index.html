{% extends "base.html" %}

{% block content %}
<section class="start-screen">
  <div class="start-copy">
    <p class="eyebrow">학교 건물 1층</p>
    <h1>등교길과 쉬는 시간에 빠르게 주문하는 키오스크</h1>
    <p>
      상품 선택, 장바구니, 카드/현금 결제, 잔돈 계산, 재고 차감을 모두
      Flask와 SQLite로 시뮬레이션합니다.
    </p>
    <div class="start-actions">
      <a class="button button-primary button-large" href="{{ url_for('menu') }}">주문 시작하기</a>
      <a class="button button-secondary button-large" href="{{ url_for('admin') }}">관리자 화면</a>
    </div>
  </div>
  <div class="kiosk-preview" aria-label="키오스크 안내 패널">
    <div class="preview-header">
      <span>오늘의 추천</span>
      <strong>간편 식사 세트</strong>
    </div>
    <div class="preview-list">
      <span>샌드위치</span>
      <span>딸기 우유</span>
      <span>초코바</span>
    </div>
    <div class="preview-total">예상 결제 5,900원</div>
  </div>
</section>
{% endblock %}
