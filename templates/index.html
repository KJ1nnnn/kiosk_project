{% extends "base.html" %}

{% block content %}
<section class="start-screen">
  <div class="start-copy">
    <h1>학생을 위한 학습 도구 대여·구매 키오스크</h1>
    <p>
      학생증을 제시하고 무선 마우스, 키보드, 독서대, 담요, c타입 충전기를 대여하세요.
    </p>
    <div class="start-actions">
      <a class="button button-primary button-large" href="{{ url_for('menu') }}">대여·구매 시작</a>
      <a class="button button-secondary button-large" href="{{ url_for('return_item') }}">물품 반납</a>
    </div>
  </div>
  <div class="kiosk-preview" aria-label="키오스크 안내 패널">
    <div class="preview-header">
      <span>이용 안내</span>
      <strong>학생증 확인 후 대여</strong>
    </div>
    <div class="preview-list">
      <span>무선 마우스</span>
      <span>c타입 충전기</span>
      <span>독서대</span>
      <span>필기구 세트</span>
      <span>포스트잇</span>
    </div>
    <div class="preview-total">대여 보증금은 반납 시 반환됩니다</div>
  </div>
  <footer class="home-footer" aria-label="홈 화면 하단 정보">
    <div>
      <span>대여·구매</span>
      <span>물품 반납</span>
      <span>장바구니</span>
      <span>보증금</span>
      <span>결제</span>
    </div>
    <strong>Powered by Python Flask</strong>
  </footer>
</section>
{% endblock %}
